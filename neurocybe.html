const bgCard = "rgba(10, 18, 30, 0.85)";
const border = "rgba(0, 212, 255, 0.12)";
const textDim = "#667788";
const textMed = "#99aabb";
const textBright = "#d0e0f0";

// ═══════════ Components ═══════════

function GlowDefs() {
  return (
    <defs>
      <filter id="glow-sm"><feGaussianBlur stdDeviation="2" result="g" /><feMerge><feMergeNode in="g" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
      <filter id="glow-md"><feGaussianBlur stdDeviation="4" result="g" /><feMerge><feMergeNode in="g" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
      <filter id="glow-lg"><feGaussianBlur stdDeviation="7" result="g" /><feMerge><feMergeNode in="g" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
      <filter id="glow-xl"><feGaussianBlur stdDeviation="10" result="g" /><feMerge><feMergeNode in="g" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
      <radialGradient id="bg-grad" cx="50%" cy="50%" r="60%"><stop offset="0%" stopColor="#0a1020" /><stop offset="100%" stopColor="#040810" /></radialGradient>
    </defs>
  );
}

function NeuralMap({ nodeStates, selected, onSelect, allNodes, nodeMap, archetype }) {
  const [hovered, setHovered] = useState(null);
  const archColor = ARCHETYPES[archetype]?.color || "#fff";

  return (
    <svg viewBox="0 0 800 740" style={{ width: "100%", height: "100%", maxHeight: "70vh" }}>
      <GlowDefs />
      <rect width="800" height="740" fill="url(#bg-grad)" />

      {/* Pathway labels */}
      {PATHWAYS.map(p => {
        const pos = nodePos(p.angle, 6.2);
        return <text key={p.id} x={pos.x} y={pos.y} fill={p.color} opacity={0.5} textAnchor="middle" style={{ fontSize: "9px", fontFamily: "Orbitron", letterSpacing: "2px", textTransform: "uppercase" }}>{p.name}</text>;
      })}

      {/* Cross connections */}
      {CROSS_CONNECTIONS.map(([a, b], i) => {
        const na = nodeMap[a], nb = nodeMap[b];
        if (!na || !nb) return null;
        const active = MASTERY[nodeStates[a]]?.idx >= 2 && MASTERY[nodeStates[b]]?.idx >= 2;
        return <line key={`cc-${i}`} x1={na.x} y1={na.y} x2={nb.x} y2={nb.y} stroke={active ? "#0af" : "#1a2a3a"} strokeWidth={active ? 1 : 0.5} opacity={active ? 0.4 : 0.1} strokeDasharray={active ? "none" : "3,6"} />;
      })}

      {/* Pathway connections (core) */}
      {PATHWAYS.map(p => p.nodes.map((n, i) => {
        if (i === 0) return null;
        const prev = p.nodes[i - 1];
        const a = nodeMap[prev.id], b = nodeMap[n.id];
        if (!a || !b) return null;
        const active = MASTERY[nodeStates[prev.id]]?.idx >= 2 && MASTERY[nodeStates[n.id]]?.idx >= 2;
        const partial = MASTERY[nodeStates[prev.id]]?.idx >= 2 || MASTERY[nodeStates[n.id]]?.idx >= 2;
        return <line key={`${prev.id}-${n.id}`} x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke={active ? p.color : partial ? p.color : "#1a2a3a"} strokeWidth={active ? 2 : 1} opacity={active ? 0.7 : partial ? 0.3 : 0.12} />;
      }))}

      {/* Specialist connections to parent */}
      {allNodes.filter(n => n.isSpecialist).map(n => {
        const parent = nodeMap[n.parentId];
        if (!parent) return null;
        const isVisible = MASTERY[nodeStates[n.parentId]]?.idx >= 3; // requires Level II in parent
        if (!isVisible) return null;
        const active = MASTERY[nodeStates[n.id]]?.idx >= 2;
        return <line key={`sp-${n.id}`} x1={parent.x} y1={parent.y} x2={n.x} y2={n.y} stroke={archColor} strokeWidth={active ? 2 : 1} opacity={active ? 0.7 : 0.3} strokeDasharray={active ? "none" : "4,4"} />;
      })}

      {/* Center node */}
      <circle cx={CX} cy={CY} r={16} fill="none" stroke="#0af" strokeWidth={0.5} opacity={0.2} />
      <circle cx={CX} cy={CY} r={3} fill="#0af" opacity={0.3} />

      {/* Core nodes */}
      {CORE_NODES.map(n => {
        const m = MASTERY[nodeStates[n.id]];
        const isSelected = selected === n.id;
        const isHovered = hovered === n.id;
        const r = m?.idx >= 4 ? 12 : m?.idx >= 3 ? 10 : m?.idx >= 2 ? 9 : m?.idx >= 1 ? 7 : 6;
        const op = m?.idx >= 2 ? 1 : m?.idx >= 1 ? 0.6 : 0.15;
        const filt = m?.idx >= 4 ? "url(#glow-xl)" : m?.idx >= 3 ? "url(#glow-lg)" : m?.idx >= 2 ? "url(#glow-md)" : m?.idx >= 1 ? "url(#glow-sm)" : "none";
        return (
          <g key={n.id} style={{ cursor: "pointer" }} onClick={() => onSelect(n.id)} onMouseEnter={() => setHovered(n.id)} onMouseLeave={() => setHovered(null)}>
            {isSelected && <circle cx={n.x} cy={n.y} r={r + 6} fill="none" stroke={n.color} strokeWidth={1} opacity={0.6}><animate attributeName="r" values={`${r + 5};${r + 8};${r + 5}`} dur="2s" repeatCount="indefinite" /></circle>}
            {m?.idx === 1 && <circle cx={n.x} cy={n.y} r={r} fill={n.color} opacity={0}><animate attributeName="r" values={`${r};${r + 10}`} dur="2s" repeatCount="indefinite" /><animate attributeName="opacity" values="0.3;0" dur="2s" repeatCount="indefinite" /></circle>}
            <circle cx={n.x} cy={n.y} r={r} fill={m?.idx >= 2 ? n.color : m?.idx >= 1 ? n.color : "#1a2535"} opacity={op} filter={filt} stroke={isHovered ? "#fff" : "none"} strokeWidth={1} />
            {m?.idx >= 2 && <circle cx={n.x} cy={n.y} r={r * 0.4} fill="#fff" opacity={0.5 + m.idx * 0.1} />}
            {(isHovered || isSelected || m?.idx >= 2) && <text x={n.x} y={n.y + r + 12} fill={textBright} textAnchor="middle" style={{ fontSize: "7.5px", fontFamily: "Exo 2", fontWeight: 400, pointerEvents: "none" }}>{n.name}</text>}
          </g>
        );
      })}

      {/* Specialist nodes */}
      {allNodes.filter(n => n.isSpecialist).map(n => {
        const parentMastery = MASTERY[nodeStates[n.parentId]]?.idx || 0;
        const isVisible = parentMastery >= 3;
        if (!isVisible) return null;
        const m = MASTERY[nodeStates[n.id]];
        const isSelected = selected === n.id;
        const isHovered = hovered === n.id;
        const r = m?.idx >= 4 ? 12 : m?.idx >= 3 ? 10 : m?.idx >= 2 ? 9 : m?.idx >= 1 ? 7 : 6;
        const op = m?.idx >= 2 ? 1 : m?.idx >= 1 ? 0.7 : 0.4;
        const filt = m?.idx >= 4 ? "url(#glow-xl)" : m?.idx >= 3 ? "url(#glow-lg)" : m?.idx >= 2 ? "url(#glow-md)" : "url(#glow-sm)";
        return (
          <g key={n.id} style={{ cursor: "pointer" }} onClick={() => onSelect(n.id)} onMouseEnter={() => setHovered(n.id)} onMouseLeave={() => setHovered(null)}>
            {isSelected && <circle cx={n.x} cy={n.y} r={r + 6} fill="none" stroke={archColor} strokeWidth={1} opacity={0.6}><animate attributeName="r" values={`${r + 5};${r + 8};${r + 5}`} dur="2s" repeatCount="indefinite" /></circle>}
            {m?.idx === 1 && <circle cx={n.x} cy={n.y} r={r} fill={archColor} opacity={0}><animate attributeName="r" values={`${r};${r + 10}`} dur="2s" repeatCount="indefinite" /><animate attributeName="opacity" values="0.3;0" dur="2s" repeatCount="indefinite" /></circle>}
            {/* Diamond shape for specialists */}
            <rect x={n.x - r} y={n.y - r} width={r * 2} height={r * 2} fill={m?.idx >= 2 ? archColor : archColor} opacity={op} filter={filt} stroke={isHovered ? "#fff" : "none"} strokeWidth={1} transform={`rotate(45 ${n.x} ${n.y})`} rx={2} />
            {m?.idx >= 2 && <circle cx={n.x} cy={n.y} r={r * 0.35} fill="#fff" opacity={0.6} />}
            {(isHovered || isSelected || m?.idx >= 2) && <text x={n.x} y={n.y + r + 14} fill={archColor} textAnchor="middle" style={{ fontSize: "7px", fontFamily: "Orbitron", fontWeight: 600, letterSpacing: "0.5px", pointerEvents: "none" }}>{n.name}</text>}
          </g>
        );
      })}

      {/* Title */}
      <text x={400} y={30} fill="#0af" textAnchor="middle" opacity={0.5} style={{ fontSize: "10px", fontFamily: "Orbitron", letterSpacing: "6px", textTransform: "uppercase" }}>Neural Augmentation Map</text>
    </svg>
  );
}

  const m = MASTERY[nodeStates[nodeId]];

  return (
    <div style={{ padding: 20, borderLeft: `1px solid ${border}`, background: bgCard, height: "100%", overflowY: "auto" }}>

        <span style={{ fontFamily: "Orbitron", fontSize: 13, color: n.color, fontWeight: 700 }}>{n.name}</span>
        {n.isSpecialist && <span style={{ fontFamily: "Orbitron", fontSize: 8, color: n.color, opacity: 0.6, letterSpacing: 2, padding: "2px 6px", border: `1px solid ${n.color}33`, borderRadius: 3 }}>SPECIALIST</span>}

      <div style={{ fontFamily: "Exo 2", fontSize: 12, color: m?.idx >= 1 ? n.color : textDim, marginBottom: 16, padding: "6px 10px", border: `1px solid ${m?.idx >= 1 ? n.color + "44" : border}`, borderRadius: 4, background: m?.idx >= 1 ? n.color + "0a" : "transparent" }}>{m?.label} — {m?.desc}</div>

      {n.stats && (
        <div style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 9, fontFamily: "Orbitron", color: textDim, letterSpacing: 2, marginBottom: 6 }}>STAT CONTRIBUTION</div>
          {Object.entries(n.stats).map(([k, v]) => {
            const stat = STATS.find(s => s.id === k);

            const parent = nodeMap[n.parentId];
            const parentLevel = MASTERY[nodeStates[n.parentId]]?.idx || 0;

            return <div style={{ fontFamily: "Exo 2", fontSize: 12, color: met ? "#0f8" : "#f66", marginBottom: 2 }}>{met ? "✓" : "○"} {parent?.name} at Integrated (Level II)</div>;
          })()}
          {!n.isSpecialist && n.prereqs?.map(pid => { const pn = nodeMap[pid]; const met = MASTERY[nodeStates[pid]]?.idx >= 2; return <div key={pid} style={{ fontFamily: "Exo 2", fontSize: 12, color: met ? "#0f8" : "#f66", marginBottom: 2 }}>{met ? "✓" : "○"} {pn?.name}</div>; })}
        </div>
      )}

      {n.codex && isUnlocked && (
        <div style={{ marginBottom: 16, padding: 12, background: "rgba(0,0,0,0.3)", borderRadius: 6, border: `1px solid ${border}` }}>
          <div style={{ fontSize: 9, fontFamily: "Orbitron", color: n.color, letterSpacing: 2, marginBottom: 8 }}>CODEX — BRIEF</div>
          <div style={{ fontFamily: "Literata", fontSize: 12, color: textDim, marginBottom: 6, fontStyle: "italic" }}>{n.codex.thinker}</div>

      )}
      {n.codex && !isUnlocked && <div style={{ padding: 12, background: "rgba(0,0,0,0.3)", borderRadius: 6, border: `1px solid ${border}`, fontFamily: "Literata", fontSize: 12, color: textDim, fontStyle: "italic" }}>◈ Codex locked — requires Grafted mastery</div>}

      {nextKey && <button onClick={() => onAdvance(nodeId)} disabled={m?.idx < 1} style={{ marginTop: 16, width: "100%", padding: "10px 16px", fontFamily: "Orbitron", fontSize: 10, letterSpacing: 2, textTransform: "uppercase", background: m?.idx >= 1 ? n.color + "22" : "transparent", border: `1px solid ${m?.idx >= 1 ? n.color + "66" : border}`, color: m?.idx >= 1 ? n.color : textDim, borderRadius: 4, cursor: m?.idx >= 1 ? "pointer" : "not-allowed", opacity: m?.idx >= 1 ? 1 : 0.5, transition: "all 0.2s" }}>{m?.idx >= 1 ? `Advance → ${MASTERY[nextKey].label}` : "Not available"}</button>}

    <div style={{ padding: 24, overflowY: "auto", height: "100%" }}>
      <div style={{ textAlign: "center", marginBottom: 32 }}>

        <div style={{ fontFamily: "Orbitron", fontSize: 9, color: textDim, letterSpacing: 4, marginBottom: 16 }}>PATHWAY INTEGRATION</div>

          <div key={p.id} style={{ marginBottom: 10 }}>

function Codex({ nodeStates, allNodes, nodeMap, archetype }) {
  const [expandedId, setExpandedId] = useState(null);
  const [section, setSection] = useState("insight");
  const archColor = ARCHETYPES[archetype]?.color || "#fff";
  const archName = ARCHETYPES[archetype]?.name || "";
  const specNodes = allNodes.filter(n => n.isSpecialist);

  const renderCodex = (n) => {
    const c = n.codex;
    if (!c) return null;
    const sections = [
      { id: "insight", label: "Core Insight" },
      c.explanation && { id: "explanation", label: "Full Explanation" },
      c.examples && { id: "examples", label: "Clinical Cases" },
      c.history && { id: "history", label: "History" },
      c.reading && { id: "reading", label: "Reading" },
    ].filter(Boolean);

    return (
      <div style={{ marginTop: 14, paddingTop: 14, borderTop: `1px solid ${border}` }}>
        <div style={{ fontFamily: "Literata", fontSize: 13, color: n.color, marginBottom: 12, fontStyle: "italic" }}>{c.thinker}</div>
        <div style={{ display: "flex", gap: 4, marginBottom: 14, flexWrap: "wrap" }}>
          {sections.map(s => (
            <button key={s.id} onClick={(e) => { e.stopPropagation(); setSection(s.id); }} style={{
              padding: "4px 10px", fontFamily: "Orbitron", fontSize: 8, letterSpacing: 1,
              background: section === s.id ? "rgba(0,212,255,0.1)" : "transparent",
              border: `1px solid ${section === s.id ? "#0af44" : border}`,
              color: section === s.id ? "#0af" : textDim, borderRadius: 3, cursor: "pointer",
            }}>{s.label}</button>
          ))}

                </div>
              </div>
            );
            return (
              <div key={n.id} style={{ marginBottom: 8, cursor: isUnlocked ? "pointer" : "default" }} onClick={() => { if (isUnlocked) { setExpandedId(isExpanded ? null : n.id); setSection("insight"); } }}>

                    <span style={{ fontFamily: "Exo 2", fontSize: 10, color: textDim, marginLeft: "auto" }}>{isUnlocked ? MASTERY[nodeStates[n.id]]?.label : "AVAILABLE"}</span>
                  </div>
                  {isExpanded && isUnlocked && renderCodex(n)}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// Seeded random
function mulberry32(a) {
  return function() {
    let t = a += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function generateChallenge(nodeStates, archetype, allNodes, seed) {
  const rng = mulberry32(seed || Date.now());
  const pick = (arr) => arr.length > 0 ? arr[Math.floor(rng() * arr.length)] : null;
  const pickN = (arr, n) => { const s = [...arr]; const r = []; for (let i = 0; i < Math.min(n, s.length); i++) { const idx = Math.floor(rng() * s.length); r.push(s.splice(idx, 1)[0]); } return r; };

  const arch = ARCHETYPES[archetype] || ARCHETYPES.diagnostician;

  // ─── Calculate difficulty from full state ───
  const mastered = Object.values(nodeStates).filter(v => MASTERY[v]?.idx >= 2).length;
  const avgLevel = Object.values(nodeStates).reduce((s, v) => s + (MASTERY[v]?.idx || 0), 0) / Math.max(Object.keys(nodeStates).length, 1);
  const stageIdx = STAGES.reduce((best, s, i) => mastered >= s.min ? i : best, 0);
  const difficulty = Math.max(1, Math.min(6, Math.ceil(stageIdx * 1.1 + avgLevel * 0.3)));
  const diffInfo = CH_DIFFICULTY_NAMES[difficulty - 1] || CH_DIFFICULTY_NAMES[0];

  // ─── Compute stats for stat-targeting ───
  const stats = calcStats(nodeStates, archetype, allNodes);
  const statEntries = Object.entries(stats).filter(([,v]) => v > 0);
  const maxStat = Math.max(...Object.values(stats), 1);
  const minStat = Math.min(...statEntries.map(([,v]) => v), maxStat);
  const weakStats = STATS.filter(s => stats[s.id] <= minStat + 1).map(s => s.id);
  const strongStats = STATS.filter(s => stats[s.id] >= maxStat - 1).map(s => s.id);

  // ─── Pathway integration analysis ───
  const pathwayMastery = {};
  PATHWAYS.forEach(p => {
    const m = p.nodes.filter(n => MASTERY[nodeStates[n.id]]?.idx >= 2).length;
    pathwayMastery[p.id] = { count: m, total: p.nodes.length, pct: m / p.nodes.length };
  });
  const unlockedPathways = PATHWAYS.filter(p => pathwayMastery[p.id].count > 0);
  const underexplored = PATHWAYS.filter(p => pathwayMastery[p.id].count > 0 && pathwayMastery[p.id].pct < 0.4);

  // ─── Pick domain ───
  const domain = pick(CH_DOMAINS);
  const scenario = pick(domain.scenarios);

  // ─── Pick pathways to test ───
  const numPathways = Math.min(unlockedPathways.length, Math.max(1, Math.floor(difficulty / 2) + 1));
  let pathwayPool = unlockedPathways.length > 0 ? unlockedPathways : PATHWAYS;
  // At difficulty 4+, weight toward underexplored pathways
  if (difficulty >= 4 && underexplored.length > 0 && rng() > 0.5) {
    pathwayPool = [...underexplored, ...pathwayPool];
  }
  const testedPathways = pickN(pathwayPool, numPathways);

  // ─── Pick specific nodes and level-appropriate V_C tasks ───
  const concepts = [];
  const vcTasks = [];

  testedPathways.forEach(p => {
    const masteredInPath = p.nodes.filter(n => MASTERY[nodeStates[n.id]]?.idx >= 2 && CH_VC_LEVELED[n.id]);
    if (masteredInPath.length > 0) {
      const node = pick(masteredInPath);
      const mIdx = MASTERY[nodeStates[node.id]]?.idx || 2;
      const levelTasks = CH_VC_LEVELED[node.id];
      // 2 tasks per level: level I = [0,1], level II = [2,3], level III = [4,5], level IV = [6,7]
      const baseIdx = Math.min((mIdx - 2) * 2, levelTasks.length - 2);
      const taskIdx = Math.min(baseIdx + Math.floor(rng() * 2), levelTasks.length - 1);
      concepts.push(node);
      vcTasks.push({
        pathway: p.name, color: p.color, task: levelTasks[taskIdx],
        nodeId: node.id, nodeName: node.name, level: mIdx, isSpecialist: false
      });
    } else {
      const fallback = p.nodes[0];
      concepts.push(fallback);
      const lvl = CH_VC_LEVELED[fallback.id];
      vcTasks.push({
        pathway: p.name, color: p.color, task: lvl ? lvl[0] : "Analyse this system through the lens of " + fallback.name + ".",
        nodeId: fallback.id, nodeName: fallback.name, level: 2, isSpecialist: false
      });
    }
  });

  // ─── Add specialist node task at difficulty 3+ ───
  let specTask = null;
  const masteredSpecNodes = allNodes.filter(n => n.isSpecialist && MASTERY[nodeStates[n.id]]?.idx >= 2 && CH_VC_LEVELED[n.id]);
  if (difficulty >= 3 && masteredSpecNodes.length > 0) {
    const specNode = pick(masteredSpecNodes);
    const mIdx = MASTERY[nodeStates[specNode.id]]?.idx || 2;
    const levelTasks = CH_VC_LEVELED[specNode.id];
    // Specialists: 4 tasks, 2 per level starting at Level II. mIdx 3→[0,1], mIdx 4+→[2,3]
    const specBase = Math.min(Math.max(0, (mIdx - 3)) * 2, levelTasks.length - 2);
    const taskIdx = Math.min(specBase + Math.floor(rng() * 2), levelTasks.length - 1);
    specTask = {
      pathway: specNode.pathwayName, color: specNode.color, task: levelTasks[taskIdx],
      nodeId: specNode.id, nodeName: specNode.name, level: mIdx, isSpecialist: true
    };
    vcTasks.push(specTask);
    concepts.push(specNode);
  }

  // ─── Add cross-pathway synthesis at difficulty 4+ ───
  let crossTask = null;
  if (difficulty >= 4 && testedPathways.length >= 2) {
    const testedIds = testedPathways.map(p => p.id);
    const eligible = CH_CROSS_PATHWAY.filter(cp => cp.pathways.every(pid => testedIds.includes(pid)));
    if (eligible.length > 0) {
      const cp = pick(eligible);
      crossTask = { pathways: cp.pathways, task: cp.task };
    }
  }

  // ─── Pick V_N task — keyed to pathway, archetype, and difficulty ───
  let vnTask, vnSource;
  const vnRoll = rng();
  // Helper: pick from tasks using difficulty-based floor (harder tasks only at higher difficulty)
  const pickVN = (tasks) => {
    const floor = Math.max(0, Math.min(Math.floor((difficulty - 1) / 2), tasks.length - 2));
    const idx = floor + Math.floor(rng() * (tasks.length - floor));
    return tasks[Math.min(idx, tasks.length - 1)];
  };
  if (vnRoll < 0.4 && testedPathways.length > 0) {
    const pw = pick(testedPathways);
    const pwTasks = CH_VN_PATHWAY[pw.id];
    if (pwTasks && pwTasks.length > 0) {
      vnTask = pickVN(pwTasks);
      vnSource = pw.name;
    }
  }
  if (!vnTask && vnRoll < 0.75) {
    const archTasks = CH_VN_ARCHETYPE[archetype];
    if (archTasks && archTasks.length > 0) {
      vnTask = pickVN(archTasks);
      vnSource = arch.name;
    }
  }
  if (!vnTask) {
    vnTask = pick(CH_VN_UNIVERSAL);
    vnSource = "Universal";
  }

  // ─── Complications ───
  const numComplications = Math.max(0, difficulty - 2);
  const eligibleComplications = CH_COMPLICATIONS.filter(c => c.minDiff <= difficulty);
  const complications = pickN(eligibleComplications, numComplications);

  // ─── Archetype framing ───
  const archFrame = CH_ARCHETYPE_FRAMES[archetype] || CH_ARCHETYPE_FRAMES.diagnostician;

  // ─── Reflexive element at difficulty 5+ ───
  const reflexive = difficulty >= 5;
  const reflexivePrompt = reflexive ? "META-RECURSIVE ELEMENT: As you work through this challenge, monitor how your own cognitive operations mirror the dynamics you are analysing. Where does your thinking exhibit the same patterns you are diagnosing in the system? Name it." : null;

  // ─── Stat target analysis ───
  const statTarget = difficulty >= 3 ? {
    weak: weakStats,
    strong: strongStats,
    note: weakStats.length > 0 ? "This challenge exercises " + weakStats.map(id => STATS.find(s => s.id === id)?.name).filter(Boolean).join(", ") + " — your currently underdeveloped stat(s)." : null,
  } : null;

  return {
    id: seed || Date.now(),
    difficulty, diffInfo, domain, scenario,
    testedPathways: testedPathways.map(p => ({ id: p.id, name: p.name, color: p.color })),
    concepts: concepts.map(c => ({ id: c.id, name: c.name, isSpecialist: !!c.isSpecialist, level: MASTERY[nodeStates[c.id]]?.idx || 2 })),
    vcTasks, vnTask, vnSource, complications, archFrame,
    crossTask, reflexive, reflexivePrompt, archetype,
    hasSpecialist: !!specTask, statTarget,
  };
}

          <div style={{ fontFamily: "Literata", fontSize: 14, color: textBright, lineHeight: 1.8 }}>{ch.vnTask}</div>

      </div>

      {/* Reflexive element */}
      {ch.reflexive && ch.reflexivePrompt && (
        <div style={{ marginBottom: 20, padding: "14px 16px", background: "rgba(255,255,255,0.02)", borderRadius: 6, border: "1px solid rgba(255,255,255,0.08)", borderLeft: "3px solid #e0e0e0" }}>

      {/* Procedure guidance */}
      <div style={{ padding: 16, background: "rgba(0,0,0,0.2)", borderRadius: 6, border: `1px solid ${border}` }}>
        <div style={{ fontFamily: "Orbitron", fontSize: 9, color: textDim, letterSpacing: 3, marginBottom: 10 }}>CENTAUR PROTOCOL</div>
        <div style={{ fontFamily: "Literata", fontSize: 13, color: textDim, lineHeight: 1.7 }}>
          Present this scenario to Chiron. Work the computable analysis together — Chiron provides V_C, you evaluate and contest. When you reach the normative judgment, Chiron maps the decision space and identifies what is undecidable. You make the call. The quality of the centaur is measured by whether both halves did their work, not by whether the answer is "correct."
        </div>
      </div>
    </div>
  );
}

function downloadBuild(state) {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `neurocybe-build-${new Date().toISOString().split("T")[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

// ═══════════ Main App ═══════════
function NeurocybeApp() {
  const [tab, setTab] = useState("map");
  const [gameState, setGameState] = useState(null);
  const [selectedNode, setSelectedNode] = useState(null);
  const [loading, setLoading] = useState(true);
  const fileRef = useRef(null);

  const specNodes = useMemo(() => gameState ? getSpecialistNodesForArch(gameState.archetype) : [], [gameState?.archetype]);
  const allNodes = useMemo(() => [...CORE_NODES, ...specNodes], [specNodes]);
  const nodeMap = useMemo(() => buildNodeMap(CORE_NODES, specNodes), [specNodes]);

  useEffect(() => {
    try {
      const raw = localStorage.getItem("neurocybe-state-v8");
      if (raw) {
        const d = JSON.parse(raw);
        if (!d.challengeLogs) d.challengeLogs = { diagnostician: [], architect: [], operative: [], node: [], archaeologist: [] };
        setGameState(d);
      }
      else { setGameState(getInitialState()); }
    } catch { setGameState(getInitialState()); }
    setLoading(false);
  }, []);

  useEffect(() => {
    if (gameState && !loading) {
      try { localStorage.setItem("neurocybe-state-v8", JSON.stringify(gameState)); } catch(e) {}
    }
  }, [gameState, loading]);

  const advanceNode = useCallback((nodeId) => {
    setGameState(prev => {
      const ns = { ...prev.nodes };
      const m = MASTERY[ns[nodeId]];
      if (!m || m.idx < 1) return prev;
      const keys = Object.keys(MASTERY);
      if (m.idx + 1 >= keys.length) return prev;
      ns[nodeId] = keys[m.idx + 1];

      // Unlock core prerequisites
      if (MASTERY[ns[nodeId]]?.idx >= 2) {
        CORE_NODES.forEach(n => {
          if (ns[n.id] === "dormant" && n.prereqs.length > 0 && n.prereqs.every(pid => MASTERY[ns[pid]]?.idx >= 2)) {
            ns[n.id] = "available";
          }
        });
      }

      // Unlock specialist nodes when parent reaches Integrated (idx 3)
      if (MASTERY[ns[nodeId]]?.idx >= 3) {
        const currentSpecs = SPECIALIST_NODES[prev.archetype] || [];
        currentSpecs.forEach(sn => {
          if (sn.parentId === nodeId && (!ns[sn.id] || ns[sn.id] === "dormant")) {
            ns[sn.id] = "available";
          }
        });
      }

      return { ...prev, nodes: ns };
    });
  }, []);

  const handleFileUpload = useCallback((e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.nodes && data.archetype) {
          if (!data.challengeLogs) data.challengeLogs = { diagnostician: [], architect: [], operative: [], node: [], archaeologist: [] };
          setGameState(data);
          setSelectedNode(null);
        }
      } catch { /* invalid */ }
    };
    reader.readAsText(file);
    e.target.value = "";
  }, []);

  const setArchetype = useCallback((id) => {
    setGameState(prev => {
      const ns = { ...prev.nodes };
      // Unlock specialist nodes for new archetype where parent is already Integrated
      const newSpecs = SPECIALIST_NODES[id] || [];
      newSpecs.forEach(sn => {
        const parentLevel = MASTERY[ns[sn.parentId]]?.idx || 0;
        if (parentLevel >= 3 && (!ns[sn.id] || ns[sn.id] === "dormant")) {
          ns[sn.id] = "available";
        }
      });
      return { ...prev, archetype: id, nodes: ns };
    });
  }, []);

  const resetState = useCallback(() => { setGameState(getInitialState()); setSelectedNode(null); }, []);

  const logChallenge = useCallback((archId, ch) => {
    setGameState(prev => {
      const logs = { ...(prev.challengeLogs || {}) };
      const archLog = [ch, ...(logs[archId] || [])].slice(0, 30);
      logs[archId] = archLog;
      return { ...prev, challengeLogs: logs };
    });
  }, []);

  if (loading || !gameState) {
    return <div style={{ background: bg, color: "#0af", height: "100vh", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Orbitron" }}><div style={{ fontSize: 11, letterSpacing: 6, opacity: 0.6 }}>INITIALIZING NEURAL INTERFACE</div></div>;
  }

  const stage = calcStage(gameState.nodes);
  const arch = ARCHETYPES[gameState.archetype] || ARCHETYPES.diagnostician;
  const tabs = [
    { id: "map", label: "Neural Map", icon: "◎" },
    { id: "operator", label: "Operator", icon: "⬡" },
    { id: "challenge", label: "Challenge", icon: "⚡" },
    { id: "codex", label: "Codex", icon: "◈" },
  ];

  return (
    <div style={{ background: bg, color: textBright, height: "100vh", display: "flex", flexDirection: "column", fontFamily: "Exo 2", overflow: "hidden" }}>
      <link href={fontLink} rel="stylesheet" />
      <style>{`* { box-sizing: border-box; margin: 0; padding: 0; } ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #0af3; border-radius: 2px; } @keyframes breathe { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }`}</style>
      <input ref={fileRef} type="file" accept=".json" style={{ display: "none" }} onChange={handleFileUpload} />

      <div style={{ padding: "12px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", borderBottom: `1px solid ${border}`, flexShrink: 0, background: "rgba(0,6,12,0.9)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ fontFamily: "Orbitron", fontSize: 16, fontWeight: 900, color: "#0af", letterSpacing: 4 }}>NEUROCYBE</div>
          <div style={{ fontFamily: "Exo 2", fontSize: 11, color: textDim, borderLeft: `1px solid ${border}`, paddingLeft: 12 }}>v8</div>
          <div style={{ fontFamily: "Exo 2", fontSize: 10, color: arch.color, borderLeft: `1px solid ${border}`, paddingLeft: 12 }}>{arch.icon} {arch.name}</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ fontFamily: "Orbitron", fontSize: 10, color: stage.color, letterSpacing: 2, animation: "breathe 3s ease-in-out infinite", marginRight: 8 }}>{stage.name.toUpperCase()}</div>
          <button onClick={() => downloadBuild(gameState)} style={{ fontFamily: "Exo 2", fontSize: 10, color: "#0fa", background: "transparent", border: `1px solid #0fa44`, padding: "4px 10px", borderRadius: 3, cursor: "pointer", letterSpacing: 1 }}>SAVE</button>
          <button onClick={() => fileRef.current?.click()} style={{ fontFamily: "Exo 2", fontSize: 10, color: "#0af", background: "transparent", border: `1px solid #0af44`, padding: "4px 10px", borderRadius: 3, cursor: "pointer", letterSpacing: 1 }}>LOAD</button>
          <button onClick={resetState} style={{ fontFamily: "Exo 2", fontSize: 10, color: textDim, background: "transparent", border: `1px solid ${border}`, padding: "4px 10px", borderRadius: 3, cursor: "pointer", letterSpacing: 1 }}>RESET</button>
        </div>
      </div>

      <div style={{ display: "flex", borderBottom: `1px solid ${border}`, flexShrink: 0, background: "rgba(0,4,8,0.9)" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            flex: 1, padding: "10px 16px", fontFamily: "Orbitron", fontSize: 10, letterSpacing: 3, textTransform: "uppercase",
            background: tab === t.id ? "rgba(0,212,255,0.05)" : "transparent",
            border: "none", borderBottom: tab === t.id ? "2px solid #0af" : "2px solid transparent",
            color: tab === t.id ? "#0af" : textDim, cursor: "pointer", transition: "all 0.2s",
          }}><span style={{ marginRight: 8 }}>{t.icon}</span>{t.label}</button>
        ))}
      </div>

      <div style={{ flex: 1, overflow: "hidden", display: "flex" }}>
        {tab === "map" && (
          <>
            <div style={{ flex: 1, overflow: "hidden", display: "flex", alignItems: "center", justifyContent: "center", padding: 8 }}>
              <NeuralMap nodeStates={gameState.nodes} selected={selectedNode} onSelect={setSelectedNode} allNodes={allNodes} nodeMap={nodeMap} archetype={gameState.archetype} />
            </div>
            {selectedNode && (
              <div style={{ width: 320, flexShrink: 0, overflowY: "auto", borderLeft: `1px solid ${border}` }}>
                <NodeSidebar nodeId={selectedNode} nodeStates={gameState.nodes} onAdvance={advanceNode} nodeMap={nodeMap} />
              </div>
            )}
          </>
        )}
        {tab === "operator" && <OperatorProfile nodeStates={gameState.nodes} archetype={gameState.archetype} onArchChange={setArchetype} allNodes={allNodes} />}
        {tab === "challenge" && <ChallengeTab nodeStates={gameState.nodes} archetype={gameState.archetype} allNodes={allNodes} challengeLogs={gameState.challengeLogs} onLogChallenge={logChallenge} />}
        {tab === "codex" && <Codex nodeStates={gameState.nodes} allNodes={allNodes} nodeMap={nodeMap} archetype={gameState.archetype} />}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(NeurocybeApp));
  </script>
</body>
</html>
