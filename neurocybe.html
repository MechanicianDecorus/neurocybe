      { id: "signal-noise", name: "Signal & Noise", tier: 2, prereqs: ["info-difference"], stats: { per: 2, dgn: 1 },
        codex: { thinker: "Claude Shannon", insight: "Every channel carries signal and noise. Reliable communication is possible in noisy channels — if you encode properly.",
          explanation: "Shannon's fundamental insight: noise is not an anomaly but a structural feature of every communication channel. The question is never 'how do we eliminate noise?' but 'how do we encode the signal so it survives the noise?' This reframing is profound — it means perfect channels are not required for reliable communication. What is required is appropriate encoding.\n\nShannon proved mathematically that for any channel with a given noise level, there exists an encoding scheme that allows information to be transmitted with arbitrarily low error probability, up to the channel's capacity limit. Below capacity: reliable communication is possible. Above capacity: errors are inevitable no matter how clever the encoding.\n\nFor the diagnostician, this framework applies far beyond telecommunications. Every system has communication channels, and every channel carries noise. Organisational reporting carries the noise of political filtering, metric distortion, and summary compression. Scientific publication carries the noise of publication bias, p-hacking, and incentive structures. Political discourse carries the noise of strategic communication, emotional amplification, and tribal signalling.\n\nThe diagnostic skill is reading signal-to-noise ratio in any channel the system depends on, and recognising when noise has overwhelmed signal so thoroughly that the channel transmits nothing useful — regardless of how much data flows through it. A firehose of noise is worse than silence, because it creates the illusion of information.",
          examples: [
            { domain: "Political", text: "Polling: the signal is genuine public sentiment. The noise is sampling error, social desirability bias, motivated reasoning, and non-response bias. A sophisticated reader reads polls not for the number but for the signal-to-noise ratio — and knows when the noise has overwhelmed the signal so thoroughly that the poll tells you more about the methodology than about the public." },
            { domain: "Organisational", text: "Annual employee surveys: the signal is genuine employee sentiment. The noise is fear of identification, question framing bias, survey fatigue, and strategic responding. Many organisations treat survey results as signal when they are predominantly noise — and make consequential decisions based on them." },
            { domain: "Scientific", text: "Medical research publications: the signal is genuine therapeutic knowledge. The noise is publication bias (negative results unpublished), p-hacking, small samples, and conflicts of interest. The replication crisis is, at its core, a signal-to-noise crisis — the field's channels carried more noise than the readers realised." },
          ],
          history: "Shannon's 'A Mathematical Theory of Communication' (1948) created information theory in a single paper — one of the most consequential publications of the twentieth century. Working at Bell Labs, Shannon was concerned with practical telecommunications, but the mathematical framework he developed applies universally to any system that transmits information through noisy channels.",
          reading: ["Claude Shannon, 'A Mathematical Theory of Communication' (1948)", "Nate Silver, 'The Signal and the Noise' (2012)", "Shannon & Weaver, 'The Mathematical Theory of Communication' (1949)"],
          connections: ["info-difference", "channel-capacity", "attenuation"],
        }},
      { id: "channel-capacity", name: "Channel Capacity", tier: 3, prereqs: ["signal-noise"], stats: { int: 2, rec: 1 },
        codex: { thinker: "Claude Shannon", insight: "Every channel has a maximum reliable information rate. Push beyond it and errors multiply.",
          explanation: "Shannon's channel capacity theorem states that every communication channel has a maximum rate at which information can be transmitted reliably. This rate — the channel capacity — is determined by the channel's bandwidth and noise level. Below capacity, arbitrarily reliable communication is achievable. Above capacity, errors become unavoidable regardless of encoding cleverness.\n\nThis theorem has profound implications far beyond telecommunications. Every organisational communication channel has a capacity: the weekly team meeting, the reporting hierarchy, the CEO's attention span, the board briefing. When more information is pushed through a channel than its capacity allows, information is lost — not occasionally or through carelessness, but systematically and inevitably. The loss is structural, not behavioural.\n\nMany organisational pathologies are channel capacity problems in disguise. The overwhelmed executive is not weak — they are a channel operating above capacity. The ignored strategic memo is not proof of bad culture — it is a signal that exceeded the attention channel's bandwidth. The distorted message that arrives at the top of a hierarchy has been compressed through multiple capacity-limited channels, each one lossy.\n\nThe diagnostic response to channel capacity problems is not 'try harder' or 'communicate better' — it is structural: add channels (delegation, parallel paths), increase channel bandwidth (longer meetings, richer media), reduce demand on the channel (better attenuation of what is sent), or redesign the information architecture entirely.",
          examples: [
            { domain: "Organisational", text: "An executive receiving 200 emails a day has exceeded channel capacity. Information is lost not because it wasn't sent but because the channel cannot carry it. The solution is not faster reading but architectural: delegation (new channels), filtering (better attenuation), or restructuring (changing what needs to reach the executive at all)." },
            { domain: "Political governance", text: "A parliament attempting to legislate on every domain of modern life has exceeded its channel capacity. The result is not bad legislators but structurally inevitable: legislation is drafted without adequate understanding, overseen without adequate attention, and implemented without adequate feedback. Delegation to agencies is a channel capacity response." },
            { domain: "Personal cognition", text: "Working memory has a channel capacity of roughly 4-7 chunks. Cognitive overload is a channel capacity problem. Expertise partly consists of better encoding — chunking more information into fewer symbols — which effectively increases the channel capacity of attention." },
          ],
          history: "Shannon proved the channel capacity theorem — also called the noisy-channel coding theorem — in his 1948 paper. It was initially controversial because it was an existence proof: Shannon showed optimal encoding schemes must exist but did not construct them. It took decades for practical codes approaching the theoretical limit to be developed (turbo codes in the 1990s, LDPC codes later).",
          reading: ["Claude Shannon, 'A Mathematical Theory of Communication' (1948)", "Stafford Beer, 'The Heart of Enterprise' (1979) — on organisational channel capacity", "George Miller, 'The Magical Number Seven, Plus or Minus Two' (1956) — on cognitive channel capacity"],
          connections: ["signal-noise", "redundancy", "attenuation"],
        }},
      { id: "redundancy", name: "Redundancy of Command", tier: 4, prereqs: ["channel-capacity"], stats: { dgn: 2, prt: 1 },
        codex: { thinker: "Shannon / McCulloch / Ashby", insight: "Redundancy is not waste — it is reliability. Efficient systems are fragile systems.",
          explanation: "Shannon proved that redundancy is how reliability is achieved in noisy channels. By encoding the same information multiple times through different channels, or by adding error-correcting structure, a system ensures that the message survives noise. Without redundancy, a single error corrupts the signal irreversibly.\n\nBiological systems are massively redundant: two kidneys, two lungs, billions of neurons with overlapping functions, multiple metabolic pathways to the same outcome. This is not inefficiency — it is the engineering solution to operating reliably in a hostile, noisy, unpredictable environment. Evolution optimises for survival, not efficiency, and survival requires redundancy.\n\nThe modern management obsession with efficiency is, from a cybernetic perspective, a systematic stripping of redundancy. Lean supply chains, minimal staffing, consolidated functions, single points of accountability — each optimisation removes a redundant pathway. Each removal increases efficiency under normal conditions and increases fragility under stress. The system becomes simultaneously more productive and more vulnerable.\n\nWarren McCulloch extended this insight to neural networks: the brain's reliability depends on redundancy of function, not precision of components. Individual neurons are noisy and unreliable. The system is reliable because the same function is implemented through multiple overlapping pathways. This principle — reliable systems from unreliable components through redundancy — is one of the deepest insights in cybernetics.",
          examples: [
            { domain: "Military", text: "Military communications use redundancy of command: the same order transmitted through multiple channels, multiple confirmation protocols, and fallback communication methods. The cost of redundancy is measured in resources. The cost of its absence is measured in lives. Organisations that strip communication redundancy for efficiency are making an implicit bet that their channels will never fail." },
            { domain: "Supply chains", text: "The global supply chain crisis of 2020-22 was a redundancy failure. Decades of just-in-time optimisation had stripped buffer inventory, alternative suppliers, and excess capacity. Under normal conditions, this was efficient. Under stress, there was no redundancy to absorb disruption, and the entire system oscillated wildly." },
            { domain: "Institutional knowledge", text: "When an organisation lays off experienced employees to cut costs, it destroys redundancy in institutional knowledge. The remaining staff may handle normal operations, but when unusual situations arise — situations that the departed employees knew how to handle — the knowledge is gone. The efficiency gain was purchased by destroying cognitive redundancy." },
          ],
          history: "Shannon's information theory provided the mathematical foundation for understanding redundancy. McCulloch's work on neural reliability extended it to biological and cognitive systems. Ashby's cybernetics generalised it to any regulatory system. More recently, Nassim Taleb's concept of antifragility — systems that gain from disorder — extends the redundancy principle beyond mere robustness to positive adaptation under stress.",
          reading: ["Claude Shannon, 'A Mathematical Theory of Communication' (1948)", "Warren McCulloch, 'Embodiments of Mind' (1965)", "Nassim Taleb, 'Antifragile' (2012)", "Charles Perrow, 'Normal Accidents' (1984) — on how efficiency creates catastrophic failure"],
          connections: ["channel-capacity", "double-bind", "algedonic"],
        }},
      { id: "double-bind", name: "Double Bind", tier: 5, prereqs: ["redundancy"], stats: { dgn: 3, rec: 2 },
        codex: { thinker: "Gregory Bateson", insight: "Contradictory messages at different logical levels, no escape, no ability to metacommunicate. The structure generates madness.",
          explanation: "The double bind is Bateson's most famous and most misunderstood concept. It is not simply a contradictory message but a specific communication pathology requiring all of the following structural conditions: (1) two or more contradictory injunctions at different logical levels — a command and a meta-command that contradict each other; (2) inability to leave the field — the receiver cannot escape the relationship or context; (3) inability to metacommunicate — the receiver cannot comment on or question the contradiction itself.\n\n'Be spontaneous' is the classic example. You cannot comply by trying (because compliance on command is not spontaneity), you cannot refuse (because refusal is disobedient), and you cannot say 'that's a paradoxical instruction' (because metacommunication about the command violates the implicit frame that the command is reasonable). You are trapped in a logically impossible situation with no exit.\n\nBateson originally proposed the double bind as a contributing factor in the etiology of schizophrenia — a hypothesis that generated enormous controversy and has been largely superseded in its specific psychiatric claims. But the structural insight remains devastatingly applicable: systems that generate double binds produce pathological behaviour in their participants, and the pathology is located in the communication structure, not in the individuals.\n\nThe diagnostic key: when you see individuals behaving irrationally, paralysed, or 'crazy' within an organisation, ask first whether the communication structure is generating double binds. The individual's behaviour may be the only sane response to an insane structure.",
          examples: [
            { domain: "Organisational", text: "An organisation that demands innovation but punishes failure. The employee receives two contradictory commands at different levels: 'take risks' (explicit) and 'don't fail' (implicit, enforced through consequences). They cannot comply with both, cannot refuse either, and cannot safely point out the contradiction. The resulting paralysis is diagnosed as 'lack of initiative' — placing the pathology in the individual rather than the structure that generated it." },
            { domain: "Parenting", text: "A parent who says 'I want you to want to clean your room.' The child cannot comply through obedience (because wanting cannot be commanded), cannot refuse (parental authority), and cannot metacommunicate ('that's a paradox'). Bateson saw these structures as pervasive in human communication, not limited to pathological families." },
            { domain: "Political", text: "A government that demands democratic participation while structurally ensuring that participation cannot change outcomes. Citizens are told to vote (explicit) while the system is designed so votes don't matter (structural). They cannot comply meaningfully, cannot refuse without being labelled apathetic, and cannot easily articulate the structural impossibility." },
          ],
          history: "Bateson and his colleagues at the Palo Alto VA Hospital published 'Toward a Theory of Schizophrenia' in 1956, introducing the double bind concept. The paper drew on Russell's theory of logical types, Bateson's anthropological fieldwork, and clinical observation. It catalysed the family therapy movement and the Palo Alto school of communication theory. Watzlawick, Beavin, and Jackson extended the work in 'Pragmatics of Human Communication' (1967), developing a broader theory of pathological communication patterns.",
          reading: ["Bateson et al., 'Toward a Theory of Schizophrenia' (1956)", "Bateson, 'Steps to an Ecology of Mind' (1972), Part III", "Watzlawick, Beavin & Jackson, 'Pragmatics of Human Communication' (1967)", "R.D. Laing, 'Knots' (1970) — poetic exploration of double bind structures"],
          connections: ["redundancy", "org-pathology", "reflexivity"],
        }},
    ]
  },
  {
    id: "autopoiesis", name: "Autopoietic Membrane", color: "#ff66aa", angle: 90,
    desc: "The cell wall. How systems produce and maintain their own identity.",
    nodes: [
      { id: "op-closure", name: "Operational Closure", tier: 1, prereqs: [], stats: { rec: 2, int: 1 },
        codex: { thinker: "Humberto Maturana", insight: "A living system's operations refer only to themselves. Closure is not isolation — it is self-reference as the basis of organisation.",
          explanation: "Operational closure is the most counterintuitive concept in Maturana's biology of cognition, and one of the most powerful once understood. It means that the operations of a system — particularly a nervous system — produce only further operations of the same system. The nervous system does not 'receive' information from the outside world. It generates internal states that trigger other internal states. What we call 'perception' is the nervous system's self-generated response to perturbation — not a representation of external reality.\n\nThis is not solipsism. The system is structurally coupled to its environment — it is affected by it, deformed by it, can be destroyed by it. But the system's response to any perturbation is determined by its own structure, not by the perturbation itself. The same perturbation produces entirely different responses in differently structured systems. Light hitting a photoreceptor produces neural activity; the same light hitting skin produces warmth. The perturbation is the same; the response depends on the structure of the receiving system.\n\nFor the diagnostician, operational closure reframes every communication failure. It was never a failure of transmission — the perturbation arrived. It was a structural mismatch: the receiving system's structure produced a different response than expected. This means that improving communication is not about sending messages more clearly but about understanding the receiving system's structure well enough to choose perturbations that will produce the desired structural change.",
          examples: [
            { domain: "Political ideology", text: "A political ideology is operationally closed: it interprets all events through its own framework. Contradictory evidence is reprocessed as confirmation. A market crash is proof of capitalist failure or proof that regulation interfered — depending on the receiving system's structure, not the event. This is not a bug — it is how self-maintaining cognitive systems work. The question is whether the closure serves viability or produces blindness." },
            { domain: "Organisational culture", text: "A strong corporate culture is operationally closed: new information is processed through existing norms and narratives. A competitor's success is reinterpreted as 'different market' or 'unsustainable tactics' — the culture maintains its self-model. This closure provides identity and coherence but can prevent the system from responding to genuine environmental shifts." },
            { domain: "Interpersonal", text: "You say something to a colleague; they respond in a way that seems completely unrelated to what you said. You are frustrated at the 'miscommunication.' Operational closure explains: your words perturbed their system, but their response was determined by their structure — their current emotional state, their history with similar conversations, their model of you. They did not misunderstand your message; they processed it through a different structure." },
          ],
          history: "Maturana developed operational closure from his experimental work on visual perception in frogs and pigeons in the 1960s, particularly the landmark paper 'What the Frog's Eye Tells the Frog's Brain' (1959, with Lettvin, McCulloch, and Pitts). His radical conclusion was that the eye does not transmit a picture of the world — it generates neural activity that the brain processes according to its own organisation. The external world triggers activity but does not determine it.",
          reading: ["Maturana & Varela, 'Autopoiesis and Cognition' (1980)", "Maturana & Varela, 'The Tree of Knowledge' (1987), Ch. 1-5", "Lettvin, Maturana, McCulloch & Pitts, 'What the Frog's Eye Tells the Frog's Brain' (1959)", "Maturana, 'Biology of Cognition' (1970)"],
          connections: ["info-difference", "structural-coupling", "second-order"],
        }},
      { id: "structural-coupling", name: "Structural Coupling", tier: 2, prereqs: ["op-closure"], stats: { int: 2, per: 1 },
        codex: { thinker: "Maturana & Varela", insight: "Closed systems interact by mutually triggering structural changes. The environment perturbs; the system determines its response.",
          explanation: "Structural coupling resolves the apparent paradox of operational closure: if systems are closed in their operations, how do they interact? The answer: not by exchanging information (nothing crosses the boundary as 'information' in the traditional sense) but by mutually triggering structural changes. Each perturbation triggers structural changes that are determined by the perturbed system's own structure, not by the perturbation.\n\nTwo systems are structurally coupled when they have a history of recurrent mutual perturbation that has shaped both systems' structures. Over time, structurally coupled systems develop congruence — not because one has transmitted information to the other, but because their structures have been mutually shaped by their history of interaction. This congruence is what we colloquially call 'understanding,' but it is not the transfer of meaning. It is the co-evolution of structures through mutual perturbation.\n\nThis has profound implications for teaching, management, therapy, and any domain where one system attempts to change another. You cannot instruct a system — you can only perturb it. What it does with the perturbation depends on its structure. The teacher's art, in this framework, is not the clear transmission of knowledge but the selection of perturbations that are likely to trigger useful structural changes given the student's current structure.",
          examples: [
            { domain: "This conversation", text: "You and I are structurally coupled right now. I perturb you with questions, scenarios, and challenges. What changes in you is determined by your structure — your history, your cognitive architecture, your current state. This is why the same Chiron system would produce different learning trajectories with different humans. The perturbation is the same; the structural change depends on the receiving system." },
            { domain: "Diplomatic relations", text: "Two nations in a long-standing alliance are structurally coupled: decades of mutual perturbation have shaped both nations' institutions, norms, and expectations. A sudden policy shift by one nation produces a response in the other that is determined by the other's structure, not by the policy itself. The alliance's history is encoded in both systems' structures." },
            { domain: "Ecosystems", text: "A predator and its prey are structurally coupled: over evolutionary time, each has shaped the other's structure. The prey's speed, camouflage, and behaviour are structural adaptations to the predator's hunting strategy, and vice versa. Neither 'designed' the other — the coupling produced mutual structural change." },
          ],
          history: "Maturana and Varela developed structural coupling as part of their theory of autopoiesis, published in 'Autopoiesis and Cognition' (1980) and made accessible in 'The Tree of Knowledge' (1987). The concept bridges biology and social theory: Niklas Luhmann adopted structural coupling as a key mechanism in his theory of social systems.",
          reading: ["Maturana & Varela, 'The Tree of Knowledge' (1987), Ch. 5-7", "Maturana & Varela, 'Autopoiesis and Cognition' (1980)", "Niklas Luhmann, 'Social Systems' (1984/1995), Ch. 6"],
          connections: ["op-closure", "autopoiesis-node", "recursion"],
        }},
      { id: "autopoiesis-node", name: "Autopoiesis", tier: 3, prereqs: ["structural-coupling"], stats: { rec: 2, dgn: 1 },
        codex: { thinker: "Maturana & Varela", insight: "An autopoietic system continuously produces the components that produce it. Identity is not a property but an ongoing achievement.",
          explanation: "Autopoiesis — literally 'self-production' — is Maturana and Varela's term for the defining characteristic of living systems. An autopoietic system is one that continuously produces the components that constitute it, through the very processes that those components make possible. The cell produces the membrane that contains the metabolic processes that produce the membrane. Stop the production, and the identity dissolves.\n\nThe concept is circular by design: autopoietic systems are their own cause and their own effect. This circularity is not a logical flaw but the essence of life itself. A living system does not have an identity that exists independently of its processes — its identity is the ongoing process of self-production. When self-production ceases, the system does not 'lose' its identity; the identity was never a thing to be lost but a process that stopped.\n\nThe extension to social systems is controversial but illuminating. Luhmann argued that social systems are autopoietic: a legal system produces the legal communications that produce the legal system. A scientific community produces the knowledge that produces the scientific community. An institution produces the norms that produce the institution. In each case, the diagnostic question is: is the autopoietic loop intact? When self-production breaks — when the institution can no longer reproduce its own conditions — it dies, no matter how strong it appears from outside.\n\nThe diagnostician reads autopoietic health: is this system still producing the conditions for its own continuation? Where is the loop weakening? What would break it entirely?",
          examples: [
            { domain: "Institutional", text: "A university produces graduates who become faculty who produce the research and teaching that attract students who become graduates. When graduates no longer want to be faculty — when the autopoietic loop breaks at the recruitment stage — the university enters a viability crisis that no amount of administrative reform can address, because the problem is in the self-production cycle itself." },
            { domain: "Cultural", text: "A language community is autopoietic: speakers produce the conversations that produce competent speakers. When the community shrinks below a threshold, there are not enough conversations to produce new fluent speakers, and the language dies — not from external attack but from autopoietic failure. The production loop broke." },
            { domain: "Economic", text: "A local economy can be autopoietic: businesses employ residents who spend at businesses who employ residents. When a major employer leaves, the spending loop breaks, other businesses fail, more residents leave, and the economy collapses. The autopoietic loop was load-bearing, and its failure cascades." },
          ],
          history: "Maturana coined 'autopoiesis' in 1972 (with help from his student Varela and a philosopher friend who suggested the Greek roots). The concept was developed in 'Autopoiesis and Cognition' (1980). Niklas Luhmann's adoption of autopoiesis for social systems theory in the 1980s generated significant debate about whether the concept could legitimately be extended beyond biology.",
          reading: ["Maturana & Varela, 'Autopoiesis and Cognition' (1980)", "Niklas Luhmann, 'Social Systems' (1984/1995)", "Maturana & Varela, 'The Tree of Knowledge' (1987), Ch. 3-4", "Milan Zeleny (ed.), 'Autopoiesis: A Theory of Living Organization' (1981)"],
          connections: ["structural-coupling", "observer", "eigenforms"],
        }},
      { id: "observer", name: "The Observer", tier: 4, prereqs: ["autopoiesis-node"], stats: { rec: 3, per: 1 },
        codex: { thinker: "Heinz von Foerster / Maturana", insight: "No observation without an observer. Their distinctions create the world they describe. Objectivity is the delusion that observation can be made without an observer.",
          explanation: "The concept of the observer is where cybernetics becomes epistemology — and where it becomes most challenging. Von Foerster and Maturana insisted, on both logical and biological grounds, that every description is made by an observer, and that the observer's properties — their cognitive structure, their history, their distinctions, their purposes — determine what they can observe. There is no 'view from nowhere.'\n\nThis is not merely a philosophical caveat to be acknowledged and then set aside. It is a structural claim with practical consequences. The observer who does not account for their own observation is the most dangerous observer — they are confident in findings that are partially artifacts of their own structure, and they cannot distinguish signal about the system from signal about themselves.\n\nThe mature diagnostician includes themselves in the diagnosis. When examining an organisation, they ask not only 'what is happening in this system?' but 'what is my observation framework making visible? What is it hiding? How is my presence as an observer changing the system's behaviour? How is the system's behaviour changing my observation?' This is not self-doubt but rigour — the recognition that observation is an operation performed by a system, and like all operations, it has structural characteristics, limitations, and biases.\n\nMaturana went further: he argued that objectivity — the claim that observations can be made independently of the observer — is not just impractical but logically incoherent. He distinguished between 'objectivity without parentheses' (the claim of observer-independent reality) and 'objectivity in parentheses' (the recognition that all claims are made by observers, and what we call 'objectivity' is intersubjective agreement among structurally similar observers).",
          examples: [
            { domain: "Consulting", text: "A consultant becomes part of the system the moment they begin observing. Their presence changes behaviour (Hawthorne effect at minimum), their framework shapes what they see (a McKinsey consultant and a systems therapist will 'see' different organisations in the same building), and their diagnosis shapes what interventions seem possible. The diagnosis is a construction, not a discovery — and the quality of that construction has real consequences." },
            { domain: "Scientific research", text: "The instrument shapes the observation. A particle physicist sees particle-like behaviour when using particle-detecting instruments and wave-like behaviour when using wave-detecting instruments. The observer (including their instruments, their theories, their expectations) is part of the phenomenon. Bohr understood this; many scientists still struggle with it." },
            { domain: "Journalism", text: "A journalist 'covering' a protest is also constructing the protest for their audience. The angle they choose, the people they interview, the footage they select — each is an observation shaped by the observer's structure. Two journalists at the same event produce two different events. The readers see the journalists' constructions, not 'what happened.'" },
          ],
          history: "The observer as a central concept in cybernetics emerged from the second-order turn catalysed by von Foerster's Biological Computer Laboratory (1958-1976). Von Foerster's famous essay 'On Constructing a Reality' (1973) laid out the epistemological implications. Maturana's parallel work in the biology of cognition provided the biological grounding: if the nervous system is operationally closed, then the observer is necessarily constructing rather than discovering.",
          reading: ["Heinz von Foerster, 'Observing Systems' (1981)", "Maturana, 'Reality: The Search for Objectivity or the Quest for a Compelling Argument' (1988)", "von Foerster, 'On Constructing a Reality' (1973)", "Humberto Maturana, 'Biology of Cognition' (1970)"],
          connections: ["autopoiesis-node", "enaction", "second-order", "good-regulator"],
        }},
      { id: "enaction", name: "Enaction", tier: 5, prereqs: ["observer"], stats: { int: 3, rec: 2 },
        codex: { thinker: "Francisco Varela / Evan Thompson", insight: "Cognition is not representation — it is the enactment of a world and a mind together through action.",
          explanation: "Enaction is Varela's radical alternative to the representational theory of mind that dominates cognitive science. The standard view holds that cognition consists of building internal representations of an external world and manipulating those representations to produce behaviour. Enaction rejects every element of this: there is no pre-given external world to be represented, no internal representations to be manipulated, and no separation between perception and action.\n\nInstead, the organism and its world co-emerge through embodied action. The organism brings forth a world through its engagement — what counts as food, obstacle, threat, or opportunity is not a property of the environment but is enacted by the organism through its structure and activity. A tick's world consists of butyric acid, warmth, and hair density. A human's world consists of meanings, obligations, possibilities, and histories. Neither is more 'real' than the other — each is enacted by its organism.\n\nFor the diagnostician, enaction means that expertise is not knowing more about the same world. The expert literally inhabits a different world — one brought forth through years of active engagement. A seasoned political operative walking into a room enacts a world of allegiances, debts, signals, and possibilities that is entirely invisible to a newcomer. The newcomer doesn't lack information about the same world — they lack the enacted world itself.\n\nThis has profound implications for learning: you cannot transmit an enacted world through description. You can only create conditions for someone to enact their own version of it through their own engagement. This is why immersive learning works where instruction fails — immersion allows enaction where instruction only transfers descriptions.",
          examples: [
            { domain: "Political expertise", text: "A seasoned political operative enacts a world of allegiances, debts, signals, and possibilities invisible to the uninitiated. They do not see the same room and know more about it — they see a different room. This is not metaphor. It is the enactive structure of expertise: the world that is brought forth through engagement." },
            { domain: "Medical diagnosis", text: "An experienced clinician walking into a patient's room perceives a gestalt — skin colour, breathing pattern, posture, facial expression — that constitutes an enacted clinical world. A student sees a person in a bed. The clinician's world contains diagnostic possibilities that the student's world does not. Years of practice enacted it." },
            { domain: "Gaming", text: "A master chess player does not see the same board as a novice. The master enacts a world of strategic tensions, tactical possibilities, and pattern structures. They perceive the board differently because their years of play have enacted a different perceptual world. This is why you described character builds 'coming together' — you were enacting a game world through mastery of its systems." },
          ],
          history: "Varela, Thompson, and Rosch published 'The Embodied Mind' in 1991, introducing enaction as an alternative to both cognitivism and connectionism. The work drew on Merleau-Ponty's phenomenology, Buddhist epistemology, and Maturana's biology of cognition. Evan Thompson continued developing the framework in 'Mind in Life' (2007), connecting enaction to phenomenology, dynamical systems theory, and the life-mind continuity thesis.",
          reading: ["Varela, Thompson & Rosch, 'The Embodied Mind' (1991)", "Evan Thompson, 'Mind in Life' (2007)", "Merleau-Ponty, 'Phenomenology of Perception' (1945)", "Alva Noë, 'Action in Perception' (2004)"],
          connections: ["observer", "ethics-observation", "constructivism"],
        }},
    ]
  },
  {
    id: "viability", name: "Viability Scaffold", color: "#ffaa00", angle: 150,
    desc: "The organ systems. How viable organisations maintain themselves.",
    nodes: [
      { id: "vsm-basics", name: "Viable System Model", tier: 1, prereqs: [], stats: { dgn: 2, prt: 1 },
        codex: { thinker: "Stafford Beer", insight: "Five necessary functions for any viable system: operations, coordination, control, intelligence, and policy.",
          explanation: "Beer's Viable System Model (VSM) is the most powerful diagnostic framework in organisational cybernetics. It identifies five functions — not departments, not roles, but functions — that must exist in any system that maintains its viability, meaning any system that survives and adapts in a changing environment.\n\nSystem 1 (Operations): The units that do the primary work — produce, deliver, serve. Each operational unit is itself a viable system (this is the recursion principle). System 2 (Coordination): Prevents oscillation and conflict between operational units. Scheduling, standards, protocols, shared information systems. System 3 (Control): Manages resources, monitors performance, ensures the whole is more than the sum of parts. The 'inside and now' — managing current internal operations. System 3* (Audit): Direct access to operations, bypassing the normal reporting chain. Sporadic, unannounced checks on reality. The mechanism that keeps System 3's model honest. System 4 (Intelligence): Scans the environment, models the future, identifies threats and opportunities. The 'outside and then.' System 5 (Policy): Identity, values, ultimate authority. Balances the demands of System 3 (internal focus) and System 4 (external focus). Answers: what is this system for?\n\nThe diagnostic power of the VSM lies in asking: where is each function? How is it performing? What pathological patterns are visible? A function can be performed well or poorly, can be hypertrophied or atrophied, can be present or entirely absent. Each configuration produces a specific and diagnosable pathology.",
          examples: [
            { domain: "Organisational diagnosis", text: "Where is System 4 (scanning)? If atrophied, the organisation cannot see its environment changing and will optimise for yesterday's conditions until crisis forces change. Where is System 5 (identity)? If no one can articulate what this organisation is for, policy collapses into reactive crisis management. Where is the System 3-4 homeostat? If internal control dominates external intelligence, the organisation perfects its operations while the market moves elsewhere." },
            { domain: "National governance", text: "System 1 (industries, public services), System 2 (regulatory coordination across sectors), System 3 (central government resource allocation, taxation), System 3* (auditors, inspectors, ombudsmen), System 4 (diplomatic corps, intelligence agencies, research institutions, think tanks), System 5 (constitution, foundational values, supreme court). Every governmental crisis can be diagnosed through the VSM: which function has failed?" },
            { domain: "Personal viability", text: "The VSM applies to individuals: System 1 (your daily activities and projects), System 2 (your routines and habits that prevent internal conflict), System 3 (your self-management and resource allocation), System 4 (your learning, environmental scanning, and future planning), System 5 (your identity and values). If you have no System 4 — no time for reading, learning, or scanning your environment — you are optimising for a world that is already passing." },
          ],
          history: "Beer developed the VSM across three major works: 'Brain of the Firm' (1972) introduced the model with neurophysiological grounding — Beer mapped the five systems to brain structures, arguing that organisational viability follows the same structural logic as biological viability. 'The Heart of Enterprise' (1979) provided the theoretical foundation. 'Diagnosing the System for Organisations' (1985) was a practical diagnostic manual. Patrick Hoverstadt's 'The Fractal Organization' (2008) brought the VSM to a new generation of practitioners.",
          reading: ["Stafford Beer, 'Brain of the Firm' (1972)", "Stafford Beer, 'Heart of Enterprise' (1979)", "Stafford Beer, 'Diagnosing the System for Organisations' (1985)", "Patrick Hoverstadt, 'The Fractal Organization' (2008)"],
          connections: ["ashbys-law", "recursion", "algedonic"],
        }},
      { id: "recursion", name: "Recursion", tier: 2, prereqs: ["vsm-basics"], stats: { rec: 2, int: 1 },
        codex: { thinker: "Stafford Beer", insight: "Viable systems contain viable systems. Same five functions at every level. Same diagnostic at every scale.",
          explanation: "Beer's principle of recursion states that every System 1 (operational unit) of a viable system is itself a viable system, containing all five functions. And each of those operational units' System 1s are viable systems in their own right, all the way down. The team is a viable system within the department, which is a viable system within the division, which is a viable system within the corporation.\n\nThis is not merely a fractal metaphor — it is a structural requirement. For each level to maintain viability, it must have its own operations, coordination, control, intelligence, and policy functions. When a level lacks one of these functions (often because a higher level has absorbed it), that level loses its ability to self-regulate and becomes dependent on the level above — which then faces a variety deficit because it cannot manage both its own complexity and the complexity it has absorbed from below.\n\nThe diagnostic power of recursion is immense: pathology at one level often manifests as symptoms at a different level. A System 4 failure at the division level (failure to scan the competitive environment) may appear as a System 1 crisis at the team level (working on products nobody wants). Recursive diagnosis traces symptoms to their structural source, which is often at a different recursion level than where the symptoms are visible.\n\nThis is why reorganisations so often fail: they rearrange the visible structure at one level while the actual pathology lives at a different recursion level entirely.",
          examples: [
            { domain: "National", text: "A nation contains states, which contain municipalities, which contain departments. At each level: is System 4 functioning? Is System 5 coherent? A breakdown in environmental scanning at the state level may produce symptoms that appear as local service failures at the municipal level. The break is often at a different level than symptoms appear." },
            { domain: "Organisational", text: "A struggling product team (System 1 crisis) is told to 'execute better.' But recursive diagnosis reveals the problem is two levels up: the business unit lacks System 4 (market intelligence), so the product team is building what was specified three years ago, not what the market needs now. Fixing the team's execution solves nothing." },
          ],
          history: "Recursion is one of Beer's most distinctive contributions. Where traditional organisation theory treats different levels of hierarchy as fundamentally different kinds of structure, Beer showed they are structurally identical — the same five functions repeated at every scale. This insight came from both neurophysiology (the brain exhibits recursive structure) and his practical consulting work.",
          reading: ["Stafford Beer, 'Heart of Enterprise' (1979), Ch. 7", "Patrick Hoverstadt, 'The Fractal Organization' (2008)", "Stafford Beer, 'Brain of the Firm' (1972), Ch. 6-8"],
          connections: ["vsm-basics", "autonomy-cohesion", "structural-coupling"],
        }},
      { id: "autonomy-cohesion", name: "Autonomy & Cohesion", tier: 3, prereqs: ["recursion"], stats: { prt: 2, dgn: 1 },
        codex: { thinker: "Stafford Beer", insight: "Parts need autonomy for local variety; the whole needs cohesion. The balance is dynamic, not fixed.",
          explanation: "This is the fundamental tension in any viable system and perhaps the deepest problem in organisational design. Operational units need autonomy to match local variety — the conditions they face on the ground, the specific challenges of their domain, the need for rapid adaptation. But the whole system needs cohesion to remain a whole — shared identity, coordinated action, efficient resource allocation, unified strategy.\n\nToo much autonomy produces fragmentation: units optimise locally at the expense of the whole, duplication proliferates, coordination costs explode, and the system loses its identity as a system. Too much cohesion produces rigidity: central control cannot match local variety, units are forced into one-size-fits-all processes, local knowledge is suppressed, and the system becomes brittle.\n\nBeer's structural insight was that this is not a balance to be 'struck' once and maintained. It is a dynamic tension managed by the System 3-4 homeostat: System 3 (internal control) pulls toward cohesion, System 4 (external intelligence) pulls toward adaptation and local autonomy, and System 5 mediates between them. The correct balance shifts as environmental complexity changes. In stable environments, cohesion can be higher. In turbulent environments, autonomy must increase.\n\nThe diagnostic question is always: which way has the balance tilted, and is that tilt appropriate for the current environment? An organisation that was appropriately cohesive in a stable market may be pathologically rigid in a disrupted one — not because the organisation changed, but because the environment did.",
          examples: [
            { domain: "Federalism", text: "Every federal crisis is a diagnostic moment in the autonomy-cohesion balance. States need enough autonomy to match local variety (different populations, economies, cultures), but the nation needs enough cohesion to act collectively (defence, trade, rights). Which direction has the balance tilted? Is that tilt appropriate for the current environment?" },
            { domain: "Corporate", text: "A multinational corporation with operations in forty countries. Global brand consistency (cohesion) versus local market adaptation (autonomy). The company that enforces global uniformity loses local customers. The one that grants total local autonomy loses brand identity and coordination benefits. The viable solution is structural, not political: design the channels through which autonomy and cohesion interact." },
            { domain: "Healthcare", text: "Clinical autonomy (doctors need freedom to make patient-specific decisions) versus institutional protocol (hospitals need standardised procedures for safety). The balance point: autonomy for clinical judgment within standardised safety protocols. But the balance must shift with context — emergency departments need more protocol; complex chronic care needs more autonomy." },
          ],
          history: "The autonomy-cohesion tension is central to Beer's entire body of work. 'Designing Freedom' (1974) addressed it most directly, arguing that freedom (autonomy) and order (cohesion) are not opposed but structurally interdependent — each requires the other to function.",
          reading: ["Stafford Beer, 'Brain of the Firm' (1972), Ch. 8-9", "Stafford Beer, 'Designing Freedom' (1974)", "Stafford Beer, 'Heart of Enterprise' (1979), Ch. 8"],
          connections: ["recursion", "algedonic", "delays"],
        }},
      { id: "algedonic", name: "Algedonic Signals", tier: 4, prereqs: ["autonomy-cohesion"], stats: { dgn: 2, per: 1 },
        codex: { thinker: "Stafford Beer", insight: "Pain and pleasure bypass hierarchy. They signal existential threats. A system that blocks algedonic channels cannot feel its own emergencies.",
          explanation: "Algedonic signals — from Greek algos (pain) and hedone (pleasure) — are Beer's term for information that bypasses the normal hierarchical channels because it signals something that threatens or enhances viability itself, not merely performance. In normal operation, information flows through the hierarchy: operational data is compressed into reports, reports into summaries, summaries into dashboards. This is appropriate for routine management. But when something threatens the system's survival, this normal filtering is too slow and too lossy. The signal must reach the top raw and fast.\n\nBiologically, this is the difference between proprioception (normal sensory feedback about body position) and pain (an algedonic signal that bypasses normal processing and demands immediate attention). You do not 'process' the sensation of touching a hot stove through your normal sensory channels — the pain signal triggers withdrawal before conscious processing occurs.\n\nOrganisationally, algedonic signals include: whistleblower reports, customer walkouts (not complaints — actual departure), employee walkouts, public crises, regulatory interventions, and any other event that signals a viability threat. These should bypass the normal hierarchy and reach decision-makers immediately.\n\nThe diagnostic question: are the algedonic channels open? Is the system capable of feeling pain? An organisation that punishes whistleblowers, filters customer complaints through marketing spin, or buries employee exit interviews has blocked its algedonic channels. It has, in Beer's evocative phrase, anaesthetised itself. The comfort of not hearing bad news is purchased at the price of viability — because the threats continue whether or not the system can feel them.",
          examples: [
            { domain: "Organisational", text: "Punishing whistleblowers blocks the algedonic channel — the system's ability to feel pain. The short-term comfort of not hearing bad news is purchased at the price of long-term viability. The threats the whistleblower tried to signal continue to grow, but now they grow in the dark, without detection, until they become catastrophic." },
            { domain: "Political", text: "A government that controls the press has blocked its algedonic channels. Protests, criticism, and investigative journalism are all algedonic signals — they bypass normal governance channels to signal that something threatens legitimacy. A government that suppresses them is not more stable — it is numb to its own emergencies." },
            { domain: "Personal", text: "Burnout that you suppress with caffeine and willpower is a blocked algedonic signal. Your system is signalling that current demands exceed capacity — a viability threat. Suppressing the signal does not remove the threat; it removes your awareness of the threat. The breakdown, when it comes, arrives without warning — because you blocked the warning system." },
          ],
          history: "Beer introduced algedonic signals as part of the VSM in 'Brain of the Firm' (1972). The concept was central to Project Cybersyn in Chile, which included an 'algedonic meter' — a real-time indicator of factory-level crises that would alert the central operations room directly, bypassing the normal reporting hierarchy.",
          reading: ["Stafford Beer, 'Brain of the Firm' (1972), Ch. 10", "Stafford Beer, 'Heart of Enterprise' (1979)", "Eden Medina, 'Cybernetic Revolutionaries' (2011), Ch. 4"],
          connections: ["autonomy-cohesion", "org-pathology", "signal-noise"],
        }},
      { id: "org-pathology", name: "Organisational Pathology", tier: 5, prereqs: ["algedonic"], stats: { dgn: 3, prt: 2 },
        codex: { thinker: "Stafford Beer / Patrick Hoverstadt", insight: "Organisations get sick in diagnosable ways. System 4 atrophied, System 3 hypertrophied, System 5 absent.",
          explanation: "The VSM's greatest diagnostic power is its ability to classify organisational pathologies structurally — the way a medical framework classifies diseases not by their surface symptoms but by their underlying mechanisms. Common pathological patterns include:\n\nSystem 4 atrophy: the organisation has allowed its environmental scanning function to wither. It cannot see changes in technology, markets, regulation, or competition until they become crises. It optimises for yesterday's conditions with increasing precision. This pathology is insidious because internal metrics look good — efficiency improves, costs decrease — until the environment shifts and the organisation discovers it has been perfecting the wrong thing.\n\nSystem 3 hypertrophy: internal control has metastasised. Bureaucracy grows, reporting requirements multiply, operational autonomy shrinks. The organisation spends more energy managing itself than doing its work. This often begins as a legitimate response to a coordination failure but continues growing long after the original problem is solved.\n\nSystem 5 hollowing: the identity function has eroded. No one can articulate what this organisation is for. Strategy becomes a collection of unconnected initiatives. Decisions are made without reference to purpose. The organisation drifts, responsive to the loudest voice or the latest crisis, because it lacks the identity that would provide coherent direction.\n\nSystem 3-4 imbalance: internal focus dominates external awareness (or more rarely, external focus dominates internal management). When System 3 dominates, the organisation is internally optimised but environmentally blind. When System 4 dominates, the organisation is full of ideas and initiatives but cannot execute or coordinate.\n\nRecursive pathology: a dysfunction at one recursion level cascading through others. A System 5 crisis at the corporate level produces System 3 dysfunction at the division level, which produces System 1 failures at the team level. Treating the team-level symptoms is futile because the cause is three levels up.",
          examples: [
            { domain: "Corporate decline", text: "A declining corporation: missed market shifts (System 4 failure), crushing internal bureaucracy (System 3 hypertrophy), identity crisis in leadership (System 5 hollowing). Three symptoms, one pathology visible from three angles. The diagnostician does not treat each symptom separately — they identify the structural syndrome." },
            { domain: "Government dysfunction", text: "A government agency that produces elaborate reports nobody reads (System 3 hypertrophy), cannot anticipate regulatory challenges (System 4 atrophy), and cannot explain its mission to the public (System 5 hollowing). The dysfunction is not 'bureaucracy' in the colloquial sense — it is a specific, diagnosable pattern of VSM pathology." },
            { domain: "Startup failure", text: "A startup that is all vision and no execution has System 4 and System 5 but no effective System 3 (resource management) or System 2 (coordination). Conversely, a startup that is all execution and no vision has System 3 but no System 4 or System 5. Both fail, but for structurally opposite reasons." },
          ],
          history: "Beer developed organisational pathology throughout his career, but Patrick Hoverstadt systematised it in 'The Fractal Organization' (2008), cataloguing common VSM pathologies and their diagnostic signatures. Angela Espinosa and Roger Walker extended the framework to sustainability challenges.",
          reading: ["Patrick Hoverstadt, 'The Fractal Organization' (2008)", "Stafford Beer, 'Diagnosing the System for Organisations' (1985)", "Angela Espinosa & Roger Walker, 'A Complexity Approach to Sustainability' (2011)", "Stafford Beer, 'Heart of Enterprise' (1979), Ch. 12"],
          connections: ["algedonic", "double-bind", "variety-engineering"],
        }},
    ]
  },
  {
    id: "recursive-eye", name: "Recursive Eye", color: "#e0e0e0", angle: 210,
    desc: "The brain examining the brain. Second-order cybernetics and the ethics of observation.",
    nodes: [
      { id: "second-order", name: "Second-Order Observation", tier: 1, prereqs: [], stats: { rec: 2, per: 1 },
        codex: { thinker: "Heinz von Foerster", insight: "First-order studies observed systems. Second-order studies observing systems. You are not outside looking in.",
          explanation: "The shift from first-order to second-order cybernetics was the field's great reflexive turn — and one of the most important intellectual transitions of the twentieth century. First-order cybernetics (Wiener, Ashby, Shannon) studied how systems regulate themselves: feedback loops, homeostasis, information processing. The cyberneticist stood outside the system, observed it, and described its mechanisms. Second-order cybernetics (von Foerster, Maturana, Bateson) asked the question that first-order cybernetics had avoided: what about the cyberneticist?\n\nThe observer is also a system — a system that observes, constructs, categorises, and regulates. Their observation is itself a cybernetic process, subject to all the dynamics they are studying: feedback, operational closure, variety constraints, information loss through channel limitations. Every model you build of a system reflects your cognitive structure as much as the system's structure. Every diagnosis is partially a self-portrait.\n\nThe second-order move is not merely to acknowledge this as a philosophical caveat and then proceed as before. It is to make observation itself the object of rigorous study: what are the structural properties of my observation? What do my frameworks make visible and invisible? How does my presence as an observer change what I observe? How does what I observe change my observation framework? These are not navel-gazing questions — they are the most practical questions a diagnostician can ask, because unexamined observation systematically produces artifacts that are mistaken for findings.",
          examples: [
            { domain: "Policy analysis", text: "An analyst studying a government is a system with biases, frameworks, and blind spots studying another system with biases, frameworks, and blind spots. The analyst who studies only the government — and not their own observation of the government — is the most dangerous kind of analyst: confident and unaware. Second-order observation means studying both." },
            { domain: "Organisational consulting", text: "Two consulting firms analyse the same company. One uses a financial framework; the other uses a systems dynamics framework. They produce radically different diagnoses — not because one is wrong, but because their observation frameworks construct different organisations from the same raw material. Second-order observation: examine the frameworks, not just the findings." },
            { domain: "Scientific method", text: "Thomas Kuhn's insight that scientific paradigms shape what counts as evidence and what questions are askable is a second-order observation about science. Normal science operates in first-order mode: observe nature, test hypotheses. Philosophy of science operates in second-order mode: observe how scientists observe nature." },
          ],
          history: "The second-order turn was catalysed by the Biological Computer Laboratory (BCL) at the University of Illinois (1958-1976), directed by Heinz von Foerster. The BCL brought together an extraordinary group — Maturana, Varela, Pask, Löfgren, Günther — who collectively shifted cybernetics from the study of observed systems to the study of observing systems. Von Foerster's 1974 paper 'Cybernetics of Cybernetics' crystallised the move: the field must apply its own methods to itself.",
          reading: ["Heinz von Foerster, 'Observing Systems' (1981)", "Heinz von Foerster, 'Understanding Understanding' (2003)", "Ranulph Glanville, 'Second Order Cybernetics' (2002)", "von Foerster, 'Cybernetics of Cybernetics' (1974)"],
          connections: ["op-closure", "constructivism", "observer"],
        }},
      { id: "constructivism", name: "Constructivism", tier: 2, prereqs: ["second-order"], stats: { rec: 2, int: 1 },
        codex: { thinker: "Ernst von Glasersfeld / von Foerster", insight: "We don't discover reality — we construct it through distinctions. Not relativism but a structural claim about cognitive operations.",
          explanation: "Radical constructivism, as developed by Ernst von Glasersfeld, makes a precise epistemological claim: knowledge is not a representation of mind-independent reality but a construction that 'fits' experience the way a key fits a lock — without resembling it. We cannot know whether our constructions correspond to reality because we have no access to reality independent of our constructions. We can only assess whether our constructions are viable — whether they survive perturbation, enable effective action, and predict experience.\n\nThis is not relativism. Von Glasersfeld was emphatic on this point: the claim is not that all constructions are equally good. Some constructions are more viable than others — they survive more perturbations, enable more effective action, cohere with more of our experience. The criterion has shifted from truth-as-correspondence (does our model match reality?) to viability (does our model work?) — but viability is still a demanding standard.\n\nFor the diagnostician, constructivism has immediate practical consequences. When two analysts examine the same system and reach different conclusions, the constructivist question is not 'who is right?' (which assumes observer-independent truth) but 'what distinctions is each analyst drawing, and what does each set of distinctions make visible and invisible?' This reframing is more diagnostic than truth-seeking because it reveals the structural properties of each analysis rather than just its conclusions.\n\nConstructivism also explains why paradigm shifts are so difficult: a paradigm is a set of distinctions that constructs a world. Changing paradigms means changing the distinctions you draw, which means the world you inhabit changes. This is not merely learning new facts about the same world — it is constructing a different world.",
          examples: [
            { domain: "Political analysis", text: "Two analysts examine the same election data and reach opposite conclusions. A realist asks: who is right? A constructivist asks: what distinctions does each analyst draw? One uses demographic categories; the other uses economic indicators. Each constructs a different election. Understanding the distinctions is more diagnostic than adjudicating the conclusions." },
            { domain: "Therapy", text: "Constructivist therapy does not tell clients that their construction of reality is 'wrong.' It helps them see that their construction is a construction — one among many possible constructions — and that alternative constructions might be more viable. The insight that 'this is how I see it, not how it is' is itself therapeutically powerful." },
            { domain: "Education", text: "Constructivist pedagogy holds that students do not absorb knowledge transmitted by teachers — they construct their own understanding through interaction with material and people. The teacher's role is to design perturbations that trigger useful constructions, not to transmit ready-made knowledge. This connects directly to structural coupling: teaching is perturbation design." },
          ],
          history: "Von Glasersfeld developed radical constructivism over four decades, drawing on Piaget's genetic epistemology, Vico's philosophy, and cybernetic insights. His 'Radical Constructivism: A Way of Knowing and Learning' (1995) is the definitive statement. Von Foerster's 'On Constructing a Reality' (1973) provided the cybernetic foundation. The constructivist movement influenced education (constructivist pedagogy), therapy (constructivist therapy), and philosophy of science.",
          reading: ["Ernst von Glasersfeld, 'Radical Constructivism' (1995)", "Heinz von Foerster, 'On Constructing a Reality' (1973)", "Paul Watzlawick (ed.), 'The Invented Reality' (1984)", "Jean Piaget, 'The Construction of Reality in the Child' (1954)"],
          connections: ["second-order", "eigenforms", "enaction"],
        }},
      { id: "eigenforms", name: "Eigenforms", tier: 3, prereqs: ["constructivism"], stats: { int: 2, rec: 1 },
        codex: { thinker: "Heinz von Foerster", insight: "Apply an operation recursively and stable forms emerge. Objects, habits, institutions — all dynamic equilibria, not fixed things.",
          explanation: "Von Foerster borrowed the mathematical concept of eigenvalues — stable values under a transformation — and applied it to cognition and social systems. An eigenform is what emerges when you apply an operation to itself repeatedly until a stable form crystallises. In mathematics: apply function f to x repeatedly — f(f(f(f(x)))) — and observe what the output converges to. That stable output is the eigenvalue of the operation.\n\nVon Foerster's radical move was to apply this to perception and social reality. Apply perception recursively and 'objects' emerge — stable patterns that we experience as things. Apply social interaction recursively and 'institutions' emerge — stable patterns that we experience as structures. Apply cognitive operations recursively and 'beliefs' emerge — stable patterns that we experience as truths.\n\nThe insight is that everything we experience as solid, permanent, and given — objects, institutions, identities, cultures, 'the way things are' — is actually a dynamic process that has stabilised into an eigenform. It feels permanent because the process reproduces it faster than we can perceive the reproduction. A table appears solid but is a cloud of particles in dynamic equilibrium. An institution appears permanent but is a pattern of interactions continuously reproduced.\n\nChange the process, and the eigenform shifts — but slowly, because eigenforms are self-stabilising. They resist perturbation precisely because they are the stable output of recursive operations. This is why institutional change is hard: you are trying to shift the stable output of a recursive process. Small perturbations are absorbed; only sustained, structural perturbation shifts the eigenform.\n\nFor the diagnostician, eigenforms explain both stability and path-dependence: current structures are the eigenforms of historical processes, and they persist even when the original processes have changed, because the eigenform has become self-maintaining.",
          examples: [
            { domain: "Organisational culture", text: "Culture is an eigenform: repeated interactions between members stabilise into 'the way we do things here.' It feels permanent but is continuously produced. Change the interactions — new meeting formats, different decision processes, altered incentive structures — and the eigenform eventually shifts. But slowly, because the old eigenform is self-stabilising: people default to familiar patterns, reinforce existing norms, and absorb small changes without structural shift." },
            { domain: "Personal identity", text: "Your sense of self is an eigenform: the stable output of recursive self-observation. You observe yourself, construct a narrative, act according to that narrative, observe the results, and refine the narrative. The 'you' that emerges is not a fixed entity but a stabilised process. Major life disruptions can destabilise the eigenform — and what feels like identity crisis is actually the process searching for a new stable state." },
            { domain: "Language", text: "Words are eigenforms: the stable output of recursive use within a community. A word's meaning is not fixed by definition but stabilised by repeated use. When usage patterns change — new contexts, new speakers, cultural shifts — the word's meaning shifts. But slowly, because usage is self-reinforcing. The dictionary records the current eigenform; it does not create it." },
          ],
          history: "Von Foerster introduced eigenforms in his essay 'Objects: Tokens for (Eigen-)Behaviors' (1981), drawing on the mathematical concept of eigenvectors and eigenvalues. Louis Kauffman extended the mathematical treatment in 'Eigenforms' (2005). Ranulph Glanville explored the implications for design and creativity. The concept has influenced social systems theory through Luhmann's adoption of self-referential systems.",
          reading: ["Heinz von Foerster, 'Objects: Tokens for (Eigen-)Behaviors' (1981)", "Louis Kauffman, 'Eigenforms' (2005)", "Ranulph Glanville, 'The Same is Different' (2004)", "von Foerster, 'Understanding Understanding' (2003)"],
          connections: ["constructivism", "reflexivity", "autopoiesis-node"],
        }},
      { id: "reflexivity", name: "Reflexivity", tier: 4, prereqs: ["eigenforms"], stats: { rec: 3, dgn: 1 },
        codex: { thinker: "von Foerster / Luhmann / Maturana", insight: "The system examining itself. The eye cannot see itself seeing — reflexivity is the disciplined attempt to work with this impossibility.",
          explanation: "Reflexivity is the most powerful and most difficult cybernetic operation. It means making your own operations visible to yourself — not through introspection (which is itself an operation with its own blind spots) but through structural self-observation: building external feedback loops that let you see patterns in your own seeing.\n\nThe paradox is real and irreducible: the eye cannot see itself. The system that observes cannot fully observe its own observation, because the act of observing changes the observing system. Reflexivity does not resolve this paradox — no operation can. Instead, it makes the paradox productive. You can build structures — journals, dialogue partners, formal models of your own process, structured reflection protocols — that function as mirrors. None is perfect. All have distortions. But all are better than unexamined operation.\n\nReflexivity operates at multiple levels. First-level reflexivity: noticing what you are doing ('I am making an assumption about this system's goals'). Second-level reflexivity: noticing the pattern in what you notice ('I consistently focus on power dynamics — what does this reveal about my framework?'). Third-level reflexivity: noticing the framework through which you notice patterns ('My tendency to see frameworks is itself a framework — what does it make invisible?'). Each level is harder and rarer than the last.\n\nFor the diagnostician, reflexivity is not optional. A diagnosis that does not include the diagnostician is incomplete — it mistakes its own construction for the system's reality. The most important moment in any diagnostic process is when the diagnostician turns the diagnostic lens on themselves and asks: how is my observation shaping what I see?",
          examples: [
            { domain: "This conversation", text: "Our conversation is a reflexive system. I perturb you; your responses perturb me; I adjust my perturbation strategy. If we examine this process while doing it — making the coupling itself the object of analysis — we are practising reflexivity. The Chiron system is designed for this: it monitors its own coupling patterns and surfaces them for inspection." },
            { domain: "Financial markets", text: "George Soros's theory of reflexivity in markets: market participants' beliefs about the market affect their actions, which affect the market, which changes the conditions that generated the beliefs. The market is not an external object to be observed — it is a reflexive system in which observation and object are mutually constitutive. This is why purely 'objective' market analysis is structurally incomplete." },
            { domain: "Research methodology", text: "Action research is institutionalised reflexivity: the researcher intervenes in a system, observes the effects, and adjusts both the intervention and their understanding. The research design explicitly includes the researcher as part of the system being studied. This is not a methodological weakness — it is a structural necessity for studying systems you are embedded in." },
          ],
          history: "Reflexivity as a cybernetic concept draws from multiple streams: von Foerster's second-order cybernetics, Luhmann's self-referential social systems theory, Maturana's biology of cognition, and Soros's economic theory. The Biological Computer Laboratory at Illinois was a reflexive environment by design — researchers studying systems were simultaneously studied as systems.",
          reading: ["Heinz von Foerster, 'Understanding Understanding' (2003)", "Niklas Luhmann, 'Social Systems' (1984/1995), Ch. 12", "George Soros, 'The Alchemy of Finance' (1987)", "Pierre Bourdieu, 'Science of Science and Reflexivity' (2001)"],
          connections: ["eigenforms", "ethics-observation", "feedback-topology"],
        }},
      { id: "ethics-observation", name: "Ethics of Observation", tier: 5, prereqs: ["reflexivity"], stats: { rec: 3, prt: 2 },
        codex: { thinker: "Heinz von Foerster", insight: "Von Foerster's imperative: act always so as to increase the number of choices. Every distinction carries ethical weight.",

rster's imperative is, at its root, an argument for maintaining the variety — the freedom, the range of possibility — of the systems you touch.",

function nodePos(angle, tier) {
  const r = 55 + tier * 52;
  const a = (angle * Math.PI) / 180;
  return { x: CX + r * Math.cos(a), y: CY + r * Math.sin(a) };
}

function getCoreNodes() {
  const nodes = [];
  PATHWAYS.forEach(p => { p.nodes.forEach((n, i) => {
    const spread = [-4, -2, 0, 2, 4];
    const pos = nodePos(p.angle + spread[i], n.tier);
    nodes.push({ ...n, pathway: p.id, pathwayName: p.name, color: p.color, ...pos, isSpecialist: false });
  }); });
  return nodes;
}
const CORE_NODES = getCoreNodes();

function getSpecialistNodesForArch(archId) {
  const specs = SPECIALIST_NODES[archId] || [];
  const archColor = ARCHETYPES[archId]?.color || "#fff";
  return specs.map((sn, i) => {
    // Position specialist nodes branching outward from parent
    const parent = CORE_NODES.find(n => n.id === sn.parentId);
    if (!parent) return null;
    const pw = PATHWAYS.find(p => p.id === parent.pathway);
    const angleOffset = (i % 2 === 0 ? -12 : 12) + (i >= 2 ? (i % 2 === 0 ? -6 : 6) : 0);
    const pos = nodePos((pw?.angle || 0) + angleOffset, sn.tier);
    return { ...sn, pathway: parent.pathway, pathwayName: parent.pathwayName + " ⟫ Specialist", color: archColor, ...pos, isSpecialist: true, prereqs: [sn.parentId] };
  }).filter(Boolean);
}

function buildNodeMap(coreNodes, specNodes) {
  const map = {};
  coreNodes.forEach(n => { map[n.id] = n; });
  specNodes.forEach(n => { map[n.id] = n; });
  return map;
}

function getInitialState() {
  const nodes = {};
  CORE_NODES.forEach(n => { nodes[n.id] = "dormant"; });
  Object.values(SPECIALIST_NODES).flat().forEach(n => { nodes[n.id] = "dormant"; });
  ["causal-loops", "ashbys-law", "info-difference", "op-closure", "vsm-basics", "second-order"].forEach(id => { nodes[id] = "available"; });
  return { nodes, archetype: "diagnostician", challengeLogs: { diagnostician: [], architect: [], operative: [], node: [], archaeologist: [] }, version: 8 };
}

function calcStats(nodeStates, archId, allNodes) {
  const s = { per: 0, int: 0, dgn: 0, rec: 0, prt: 0 };
  const arch = ARCHETYPES[archId] || ARCHETYPES.diagnostician;
  allNodes.forEach(n => {
    const m = MASTERY[nodeStates[n.id]];
    if (m && m.idx >= 2 && n.stats) {
      const lvlMult = m.idx >= 4 ? 1.5 : m.idx >= 3 ? 1.25 : 1;
      Object.entries(n.stats).forEach(([k, v]) => {
        s[k] += Math.round(v * lvlMult * (arch.statMult[k] || 1));
      });
    }
  });
  return s;
}

function calcStage(nodeStates) {
  const mastered = Object.values(nodeStates).filter(v => MASTERY[v]?.idx >= 2).length;
  let stage = STAGES[0];
  STAGES.forEach(s => { if (mastered >= s.min) stage = s; });
  return { ...stage, mastered };
}

function calcPathwayProgress(nodeStates) {
  return PATHWAYS.map(p => {
    const total = p.nodes.length;
    const mastered = p.nodes.filter(n => MASTERY[nodeStates[n.id]]?.idx >= 2).length;
    return { id: p.id, name: p.name, color: p.color, mastered, total, pct: Math.round((mastered / total) * 100) };
  });
}
